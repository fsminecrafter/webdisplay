<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>WebDisplay</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%;background:#0a0a0a;overflow:hidden;font-family:monospace}
  #wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;width:100%;height:100%}
  #canvas{image-rendering:pixelated;image-rendering:crisp-edges;cursor:crosshair;display:block}
  #hud{position:fixed;top:0;left:0;right:0;display:flex;align-items:center;justify-content:space-between;
       padding:6px 14px;background:rgba(0,0,0,.55);backdrop-filter:blur(8px);
       color:#0f0;font-size:11px;z-index:100;transition:opacity .4s}
  #hud.hide{opacity:0;pointer-events:none}
  #status{display:flex;gap:12px;align-items:center}
  .dot{width:8px;height:8px;border-radius:50%;background:#f00;display:inline-block;transition:background .3s}
  .dot.on{background:#0f0;box-shadow:0 0 6px #0f0}
  button{background:transparent;border:1px solid #0f08;color:#0f0;padding:2px 10px;
         border-radius:3px;cursor:pointer;font-family:monospace;font-size:11px}
  button:hover{background:#0f02}
  #fps{opacity:.6}
  #coords{opacity:.6;font-variant-numeric:tabular-nums;min-width:120px}
</style>
</head>
<body>
<div id="hud">
  <div id="status">
    <span class="dot" id="dot"></span>
    <span id="connlabel">Connecting…</span>
    <span id="fps">-- fps</span>
  </div>
  <div id="coords">x:0 y:0</div>
  <div>
    <button id="btnFs">⛶ Fullscreen</button>
    <button id="btnClip">📋 Sync Clipboard</button>
  </div>
</div>
<div id="wrap"><canvas id="canvas"></canvas></div>

/* ── pixel-level text renderer using ImageData ──────────────── */
function drawText8(x, y, rgb, text) {
  const r=(rgb>>16)&0xff, g=(rgb>>8)&0xff, b=rgb&0xff;
  const img = ctx.createImageData(text.length*8, 8);
  const d = img.data;
  for (let ci=0; ci<text.length; ci++) {
    const cc = text.charCodeAt(ci) - 32;
    if (cc < 0 || cc >= 95) continue;
    for (let row=0; row<8; row++) {
      const byte = FONT8[cc*8+row];
      for (let bit=0; bit<8; bit++) {
        if (byte & (0x80>>bit)) {
          const idx = (row * text.length*8 + ci*8+bit)*4;
          d[idx]=r; d[idx+1]=g; d[idx+2]=b; d[idx+3]=255;
        }
      }
    }
  }
  ctx.putImageData(img, x, y);
}

/* ── drawing dispatcher ─────────────────────────────────────── */
function u16(v, o) { return (v[o]<<8)|v[o+1]; }
function u32rgb(v, o) { return (v[o]<<16)|(v[o+1]<<8)|v[o+2]; }
function cssrgb(v, o) {
  return `rgb(${v[o]},${v[o+1]},${v[o+2]})`;
}

const OP = {
  PIXEL:0x01, LINE:0x02, BOX:0x03, CIRCLE:0x04,
  TRIANGLE:0x05, TEXT:0x06, BMP:0x07, CLEAR:0x08,
  RESOLUTION:0x09, SET_CLIPBOARD:0x20
};

function dispatch(u8) {
  const op = u8[0];
  switch(op) {
    case OP.PIXEL: {
      const x=u16(u8,1),y=u16(u8,3);
      ctx.fillStyle = cssrgb(u8,4);
      ctx.fillRect(x,y,1,1);
      break;
    }
    case OP.LINE: {
      ctx.strokeStyle = cssrgb(u8,8);
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(u16(u8,1)+.5, u16(u8,3)+.5);
      ctx.lineTo(u16(u8,5)+.5, u16(u8,7)+.5);
      ctx.stroke();
      break;
    }
    case OP.BOX: {
      const x=u16(u8,1),y=u16(u8,3),w=u16(u8,5),h=u16(u8,7);
      const fill=u8[13];
      if (fill) {
        ctx.fillStyle = cssrgb(u8,9);
        ctx.fillRect(x,y,w,h);
      } else {
        ctx.strokeStyle = cssrgb(u8,9);
        ctx.lineWidth = 1;
        ctx.strokeRect(x+.5,y+.5,w,h);
      }
      break;
    }
    case OP.CIRCLE: {
      const cx=u16(u8,1),cy=u16(u8,3),r=u16(u8,5);
      const fill=u8[11];
      ctx.beginPath();
      ctx.arc(cx,cy,r,0,Math.PI*2);
      if (fill) { ctx.fillStyle=cssrgb(u8,7); ctx.fill(); }
      else       { ctx.strokeStyle=cssrgb(u8,7); ctx.lineWidth=1; ctx.stroke(); }
      break;
    }
    case OP.TRIANGLE: {
      const fill=u8[15];
      ctx.beginPath();
      ctx.moveTo(u16(u8,1), u16(u8,3));
      ctx.lineTo(u16(u8,5), u16(u8,7));
      ctx.lineTo(u16(u8,9), u16(u8,11));
      ctx.closePath();
      if (fill) { ctx.fillStyle=cssrgb(u8,12); ctx.fill(); }
      else       { ctx.strokeStyle=cssrgb(u8,12); ctx.lineWidth=1; ctx.stroke(); }
      break;
    }
    case OP.TEXT: {
      const x=u16(u8,1),y=u16(u8,3);
      const font=u8[5];
      const rgb=u32rgb(u8,6);
      const text=new TextDecoder().decode(u8.slice(10));
      if (font===0) {
        drawText8(x,y,rgb,text);
      } else if (font===1) {
        /* 16x16: scale up 8x8 */
        ctx.save();
        ctx.translate(x,y); ctx.scale(2,2);
        drawText8(0,0,rgb,text);
        ctx.restore();
      } else {
        /* System monospace fallback */
        ctx.fillStyle = cssrgb(u8,6);
        ctx.font = '14px monospace';
        ctx.fillText(text,x,y+14);
      }
      break;
    }
    case OP.BMP: {
      const x=u16(u8,1),y=u16(u8,3),w=u16(u8,5),h=u16(u8,7);
      const pixels = u8.slice(9);
      const img = ctx.createImageData(w,h);
      const d=img.data;
      for(let i=0,o=0;i<w*h;i++,o+=3){
        d[i*4]=pixels[o]; d[i*4+1]=pixels[o+1];
        d[i*4+2]=pixels[o+2]; d[i*4+3]=255;
      }
      ctx.putImageData(img,x,y);
      break;
    }
    case OP.CLEAR: {
      const rgb = (u8[1]<<16)|(u8[2]<<8)|u8[3];
      ctx.fillStyle = `#${rgb.toString(16).padStart(6,'0')}`;
      ctx.fillRect(0,0,canvasW,canvasH);
      break;
    }
    case OP.RESOLUTION: {
      canvasW=u16(u8,1); canvasH=u16(u8,3);
      canvas.width=canvasW; canvas.height=canvasH;
      fitCanvas();
      ctx.fillStyle='#000';
      ctx.fillRect(0,0,canvasW,canvasH);
      break;
    }
    case OP.SET_CLIPBOARD: {
      const txt = new TextDecoder().decode(u8.slice(1));
      navigator.clipboard.writeText(txt).catch(()=>{});
      break;
    }
  }
  frameCount++;
}

/* ── WebSocket connection ───────────────────────────────────── */
/* The server is a tiny C implementation on the ESP32 — connect directly
 * to the same host:port the page was served from, path /ws. */
let retryDelay = 1000;  /* ms — doubles on each failure, caps at 8s */

function connect() {
  /* Build the WebSocket URL from the page origin so it works regardless
   * of the device IP. location.host includes the port (e.g. 192.168.1.x:6868). */
  const url = `ws://${location.host}/ws`;
  connlabel.textContent = 'Connecting…';
  dot.className = 'dot';

  try {
    ws = new WebSocket(url);
  } catch(e) {
    scheduleReconnect();
    return;
  }
  ws.binaryType = 'arraybuffer';

  ws.onopen = () => {
    retryDelay = 1000;           /* reset backoff on success */
    dot.className = 'dot on';
    connlabel.textContent = 'Connected';
    showHud();
  };

  ws.onclose = (ev) => {
    dot.className = 'dot';
    connlabel.textContent = `Disconnected — retrying in ${retryDelay/1000}s…`;
    scheduleReconnect();
  };

  /* onerror is always followed by onclose; just let onclose handle retry */
  ws.onerror = () => {};

  ws.onmessage = (e) => {
    if (e.data instanceof ArrayBuffer) {
      dispatch(new Uint8Array(e.data));
    }
  };
}

function scheduleReconnect() {
  const delay = retryDelay;
  retryDelay = Math.min(retryDelay * 2, 8000);  /* exponential backoff, max 8s */
  setTimeout(connect, delay);
}

/* ── input → server ─────────────────────────────────────────── */
const EV = { MOUSE:0x10, KEY:0x11, CLIPBOARD:0x12 };

function sendMouse(buttons) {
  if (!ws || ws.readyState!==1) return;
  const b = new Uint8Array(7);
  const v = new DataView(b.buffer);
  b[0]=EV.MOUSE;
  v.setInt16(1,lastMX,false); v.setInt16(3,lastMY,false);
  b[5]=buttons; b[6]=0;
  ws.send(b);
}
function sendKey(code) {
  if (!ws || ws.readyState!==1) return;
  const b = new Uint8Array(5);
  const v = new DataView(b.buffer);
  b[0]=EV.KEY;
  v.setUint32(1,code,false);
  ws.send(b);
}
function sendClipboard(txt) {
  if (!ws || ws.readyState!==1) return;
  const enc = new TextEncoder().encode(txt);
  const b = new Uint8Array(1+enc.length);
  b[0]=EV.CLIPBOARD; b.set(enc,1);
  ws.send(b);
}

/* throttle mousemove to ~60 reports/sec */
let lastMX=0,lastMY=0,lastButtons=0,mousePending=false;
function schedMouse(x,y,buttons){
  lastMX=x; lastMY=y; lastButtons=buttons;
  coordsEl.textContent=`x:${x} y:${y}`;
  if(mousePending) return;
  mousePending=true;
  requestAnimationFrame(()=>{ mousePending=false; sendMouse(lastButtons); });
}

/* canvas coordinates accounting for CSS scaling */
function canvasXY(e) {
  const r=canvas.getBoundingClientRect();
  return [
    Math.round((e.clientX-r.left)*(canvasW/r.width)),
    Math.round((e.clientY-r.top) *(canvasH/r.height))
  ];
}

canvas.addEventListener('mousemove', e=>{
  const [x,y]=canvasXY(e);
  schedMouse(x,y,lastButtons);
});
canvas.addEventListener('mousedown', e=>{
  const [x,y]=canvasXY(e);
  const m=(e.buttons&1)|((e.buttons&2));
  schedMouse(x,y,m);
});
canvas.addEventListener('mouseup', e=>{
  const [x,y]=canvasXY(e);
  schedMouse(x,y,0);
});
canvas.addEventListener('contextmenu', e=>e.preventDefault());

document.addEventListener('keydown', e=>{
  sendKey(e.keyCode|(e.shiftKey?0x10000:0)|(e.ctrlKey?0x20000:0)|(e.altKey?0x40000:0));
});

/* ── canvas sizing ──────────────────────────────────────────── */
function fitCanvas() {
  const aw=window.innerWidth, ah=window.innerHeight;
  const scale=Math.min(aw/canvasW, ah/canvasH);
  canvas.style.width  = Math.floor(canvasW*scale)+'px';
  canvas.style.height = Math.floor(canvasH*scale)+'px';
}
window.addEventListener('resize', fitCanvas);
fitCanvas();

/* ── fullscreen ─────────────────────────────────────────────── */
document.getElementById('btnFs').onclick = () => {
  if (!document.fullscreenElement) document.documentElement.requestFullscreen();
  else document.exitFullscreen();
};
document.addEventListener('fullscreenchange', fitCanvas);
document.addEventListener('dblclick', ()=>{
  if(!document.fullscreenElement) document.documentElement.requestFullscreen();
});

/* ── clipboard sync button ──────────────────────────────────── */
document.getElementById('btnClip').onclick = async () => {
  try {
    const txt = await navigator.clipboard.readText();
    sendClipboard(txt);
  } catch(e) { console.warn('Clipboard read failed', e); }
};

/* ── HUD auto-hide ──────────────────────────────────────────── */
function showHud(){
  hudEl.classList.remove('hide');
  clearTimeout(hudTimer);
  hudTimer=setTimeout(()=>hudEl.classList.add('hide'),3000);
}
document.addEventListener('mousemove', showHud);
document.addEventListener('keydown', showHud);

/* ── FPS counter ─────────────────────────────────────────────── */
setInterval(()=>{
  const now=performance.now();
  const fps=Math.round(frameCount/(( now-lastFpsTime)/1000));
  frameCount=0; lastFpsTime=now;
  fpsEl.textContent=fps+' fps';
}, 1000);

/* ── boot ───────────────────────────────────────────────────── */
canvas.width=canvasW; canvas.height=canvasH;
ctx.fillStyle='#000'; ctx.fillRect(0,0,canvasW,canvasH);
connect();
</script>
</body>
</html>
